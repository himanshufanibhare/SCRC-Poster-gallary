server {
    listen 80;
    server_name smartcvityliving.iiit.ac.in;

    location /posters/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /posters/static/ {
        alias /var/www/posters/static/;
    }
}
