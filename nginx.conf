server {
    listen 80;
    server_name smartcvityliving.iiit.ac.in.com;

    location /demoboards/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /demoboards/static/ {
        alias /var/www/demoboards/static/;
    }
}
