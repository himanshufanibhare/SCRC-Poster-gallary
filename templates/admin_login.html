<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login - SCRC Poster Gallery</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .login-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            color: var(--accent);
            margin: 0 0 10px 0;
            font-size: 1.6rem;
        }

        .login-sub {
            color: var(--muted);
            margin: 0 0 30px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #e6eef6;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e6eef6;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-btn {
            appearance: none;
            border: 0;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            color: #021025;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #f87171;
            margin-top: 12px;
            font-size: 0.9rem;
            display: none;
        }

        .error-msg.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Admin Access</h1>
            <p class="login-sub">Enter password to edit poster sections</p>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required autofocus />
                </div>
                <button type="submit" class="login-btn">Login</button>
                <div id="error-msg" class="error-msg">Invalid password. Please try again.</div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');

            const formData = new FormData(form);
            try {
                const response = await fetch('{{ URL_PREFIX }}/admin/login', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    window.location.href = '{{ URL_PREFIX }}/admin';
                } else {
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.classList.add('show');
                errorMsg.textContent = 'Login failed. Please try again.';
            }
        });
    </script>

    <footer class="site-footer">
        <div class="container">
            <small>&lt;/&gt; Developed at <a href="https://smartcitylivinglab.iiit.ac.in/" target="_blank"
                    rel="noopener noreferrer">Smart City Research Center</a></small>
        </div>
    </footer>
</body>

</html>
